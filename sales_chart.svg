<!doctype html>
<html>
<head><title>Line Chart</title></head>
<body style="font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
<svg width="700" height="450" style="background: white; border: 2px solid #333; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.2);">
  <!-- Background -->
  <rect width="700" height="450" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Monthly Sales (2024)</text>
  
  <!-- Chart area -->
  <rect x="50" y="60" width="600" height="350" fill="#fafafa" stroke="#333" stroke-width="1" rx="4"/>
  
  <!-- Y-axis label -->
  <text x="20" y="235" text-anchor="middle" font-size="14" transform="rotate(-90, 20, 235)" fill="#666" font-weight="bold">Revenue ($)</text>
  
  <!-- X-axis label -->
  <text x="350" y="425" text-anchor="middle" font-size="14" fill="#666">Month</text>
  
  <!-- Grid lines -->
  <g stroke="#eee" stroke-width="1">
    <line x1="50" y1="420" x2="650" y2="420"/>
    <line x1="50" y1="350" x2="650" y2="350"/>
    <line x1="50" y1="280" x2="650" y2="280"/>
    <line x1="50" y1="210" x2="650" y2="210"/>
    <line x1="50" y1="140" x2="650" y2="140"/>
    <line x1="50" y1="70" x2="650" y2="70"/>
  </g>
  
  <!-- Y-axis ticks and labels -->
  <g font-size="12" fill="#333" text-anchor="end">
    <text x="45" y="425">$0</text>
    <text x="45" y="355">$50K</text>
    <text x="45" y="285">$100K</text>
    <text x="45" y="215">$150K</text>
    <text x="45" y="145">$200K</text>
    <text x="45" y="75">$250K</text>
  </g>
  
  <!-- X-axis ticks and labels -->
  <g font-size="12" fill="#333" text-anchor="middle">
    <text x="70" y="440">Jan</text>
    <text x="150" y="440">Feb</text>
    <text x="230" y="440">Mar</text>
    <text x="310" y="440">Apr</text>
    <text x="390" y="440">May</text>
    <text x="470" y="440">Jun</text>
    <text x="550" y="440">Jul</text>
    <text x="630" y="440">Aug</text>
  </g>
  
  <!-- Data Line -->
  <polyline points="70,280 150,260 230,220 310,200 390,180 470,230 550,280 630,310" 
            fill="none" stroke="#667eea" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Data Points -->
  <g fill="#667eea">
    <circle cx="70" cy="280" r="5" stroke="white" stroke-width="2"/>
    <circle cx="150" cy="260" r="5" stroke="white" stroke-width="2"/>
    <circle cx="230" cy="220" r="5" stroke="white" stroke-width="2"/>
    <circle cx="310" cy="200" r="5" stroke="white" stroke-width="2"/>
    <circle cx="390" cy="180" r="5" stroke="white" stroke-width="2"/>
    <circle cx="470" cy="230" r="5" stroke="white" stroke-width="2"/>
    <circle cx="550" cy="280" r="5" stroke="white" stroke-width="2"/>
    <circle cx="630" cy="310" r="5" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Value Labels -->
  <g font-size="11" fill="#333">
    <text x="75" y="273">$130K</text>
    <text x="155" y="253">$140K</text>
    <text x="235" y="213">$170K</text>
    <text x="315" y="193">$180K</text>
    <text x="395" y="173">$200K</text>
    <text x="475" y="223">$160K</text>
    <text x="555" y="273">$130K</text>
    <text x="635" y="303">$110K</text>
  </g>
  
  <!-- Legend -->
  <rect x="50" y="40" width="150" height="30" fill="white" stroke="#ccc" rx="4"/>
  <rect x="60" y="48" width="10" height="10" fill="#667eea"/>
  <text x="80" y="61" font-size="12" fill="#333">Revenue Trend</text>
  <text x="195" y="61" font-size="11" fill="#666" font-style="italic">↑ 28% growth from Jan to Jul</text>
  
  <!-- Footer -->
  <text x="350" y="445" text-anchor="middle" font-size="10" fill="#999">Generated 2024-08-21 14:30 UTC</text>
</svg>
</body>
</html>